<section class="page">
  <header class="page-header">
    <h1>Comparer des sites</h1>
  </header>

  <section class="content">
    <div class="sites-list">
      <h2>Sélection des sites</h2>
      <ul>
        <li *ngFor="let site of sites">
          <label>
            <input
              type="checkbox"
              [checked]="selectedIds.includes(site.id!)"
              (change)="toggleSelection(site.id!, $event.target.checked)"
            />
            {{ site.name }}
          </label>
        </li>
      </ul>

      <button class="btn btn-primary" (click)="compare()">Comparer</button>
    </div>

    <div class="results" *ngIf="comparison">
      <h2>Résultats comparés</h2>

      <table class="table">
        <thead>
          <tr>
            <th>Site</th>
            <th>CO₂ total (t)</th>
            <th>CO₂ / m²</th>
            <th>CO₂ / employé</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of comparison.rows">
            <td>{{ row.name }}</td>
            <td>{{ row.totalCo2Kg / 1000 | number : '1.0-1' }}</td>
            <td>{{ row.co2PerM2 | number : '1.0-1' }}</td>
            <td>{{ row.co2PerEmployee | number : '1.0-1' }}</td>
          </tr>
        </tbody>
      </table>

      <app-bar-chart
        [labels]="comparison.rows.map((r: any) => r.name)"
        [values]="comparison.rows.map((r: any) => r.totalCo2Kg)"
      />
    </div>
  </section>
</section>
