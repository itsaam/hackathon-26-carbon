<section class="page">
  <header class="page-header">
    <h1>Sites</h1>
    <a class="btn btn-primary" [routerLink]="['/sites/new']">Nouveau site</a>
  </header>

  <div *ngIf="loading" class="loading">Chargement des sites…</div>

  <table *ngIf="!loading && sites.length" class="table">
    <thead>
      <tr>
        <th>Nom</th>
        <th>Surface (m²)</th>
        <th>Employés</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let site of sites">
        <td>{{ site.name }}</td>
        <td>{{ site.surfaceM2 }}</td>
        <td>{{ site.employeeCount }}</td>
        <td>
          <a [routerLink]="['/sites', site.id]" class="link">Détail</a>
        </td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && !sites.length" class="empty">
    Aucun site pour le moment. Créez votre premier site pour calculer son empreinte carbone.
  </p>
</section>
