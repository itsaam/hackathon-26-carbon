<section class="page">
  <header class="page-header">
    <h1>Nouveau site</h1>
  </header>

  <form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <div class="grid">
      <label>
        <span>Nom du site</span>
        <input type="text" formControlName="name" />
      </label>

      <label>
        <span>Surface (m²)</span>
        <input type="number" formControlName="surfaceM2" />
      </label>

      <label>
        <span>Parking sous-dalle</span>
        <input type="number" formControlName="parkingUnderground" />
      </label>

      <label>
        <span>Parking sous-sol</span>
        <input type="number" formControlName="parkingBasement" />
      </label>

      <label>
        <span>Parkings aériens</span>
        <input type="number" formControlName="parkingOutdoor" />
      </label>

      <label>
        <span>Consommation énergie (MWh/an)</span>
        <input type="number" formControlName="energyConsumptionMwh" />
      </label>

      <label>
        <span>Nombre d'employés</span>
        <input type="number" formControlName="employeeCount" />
      </label>

      <label>
        <span>Postes de travail</span>
        <input type="number" formControlName="workstationCount" />
      </label>
    </div>

    <section class="materials">
      <div class="materials-header">
        <h2>Matériaux</h2>
        <button type="button" class="btn btn-secondary" (click)="addMaterialRow()">
          Ajouter un matériau
        </button>
      </div>

      <div formArrayName="materials" class="materials-list">
        <div
          class="materials-row"
          *ngFor="let mat of materialsArray.controls; let i = index"
          [formGroupName]="i"
        >
          <select formControlName="materialId">
            <option [ngValue]="null">Sélectionner un matériau</option>
            <option *ngFor="let m of materialsOptions" [ngValue]="m.id">
              {{ m.name }}
            </option>
          </select>

          <input type="number" formControlName="quantity" placeholder="Quantité (tonnes)" />

          <button type="button" class="btn btn-ghost" (click)="removeMaterialRow(i)">
            Supprimer
          </button>
        </div>
      </div>
    </section>

    <button type="submit" class="btn btn-primary" [disabled]="saving">
      {{ saving ? 'Enregistrement…' : 'Enregistrer et calculer' }}
    </button>
  </form>
</section>
