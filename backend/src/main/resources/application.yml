server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: never

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: 86400000
  ocr:
    # Linux (serveur). Vérifie avec: `which tesseract` → souvent /usr/bin/tesseract
    tesseractPath: ${APP_OCR_TESSERACTPATH:/usr/bin/tesseract}
    # Langue OCR (pack tesseract-ocr-fra)
    lang: ${APP_OCR_LANG:fra}
  ollama:
    # Ollama tourne sur le serveur (souvent dans le même host) : `ollama serve` → 11434
    baseUrl: ${APP_OLLAMA_BASEURL:http://127.0.0.1:11434}
    # Modèle conseillé: llama3.1:8b (déjà présent chez toi)
    model: ${APP_OLLAMA_MODEL:llama3.1:8b}
  geocoding:
    nominatim-base-url: https://nominatim.openstreetmap.org
    user-agent: carbon-hackathon-26-demo (local)

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"
  endpoint:
    health:
      show-details: when_authorized
  info:
    env:
      enabled: true
