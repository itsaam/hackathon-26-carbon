server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/carbon}
    username: ${SPRING_DATASOURCE_USERNAME:carbon}
    password: ${SPRING_DATASOURCE_PASSWORD:carbon}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

app:
  jwt:
    secret: ${APP_JWT_SECRET:dev-secret-change-me}
    expiration: 86400000
  geocoding:
    nominatim-base-url: https://nominatim.openstreetmap.org
    user-agent: carbon-hackathon-26-demo (dev)

